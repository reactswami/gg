      display: flex;
      justify-content: center;
      align-items: center;

      opacity: 0;
      animation-name: preloader-fade-in;
      animation-iteration-count: 1;
      animation-duration: .9s;
      animation-delay: 1.35s;
      animation-fill-mode: forwards;
      padding-left: 30px;

      animation-name: preloader-bounce;
      animation-duration: 1s;
      animation-iteration-count: infinite;

    .preloader__text {
      margin-top: 16px;
      font-weight: 500;
      font-size: 14px;
      font-family: var(--font-family);
      opacity: 0;
      animation-name: preloader-fade-in;
      animation-duration: .9s;
      animation-delay: 1.8s;
      animation-fill-mode: forwards;
    }

    .theme-light .preloader__text {
      color: #52545c;
    }

    .theme-dark .preloader__text {
      color: #d8d9da;
    }

    @keyframes preloader-fade-in {
      0% {
        opacity: 0;
        /*animation-timing-function: linear;*/
        animation-timing-function: cubic-bezier(0, 0, 0.5, 1)
      }
      100% {
        opacity: 1;
      }
    }

    @keyframes preloader-bounce {
      from,
      to {
        transform: translateY(0px);
        animation-timing-function: cubic-bezier(0.3, 0.0, 0.1, 1)
      }
      50% {
        transform: translateY(-30px);
        animation-timing-function: cubic-bezier(.9, 0, .7, 1)
      }
    }

    @keyframes preloader-rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Fail info */
    .preloader__text--fail {
      display: none;
    }

    /* stop logo animation */
    .preloader--done .preloader__bounce,
    .preloader--done .preloader__logo {
      animation-name: none;
      display: none;
    }

    .preloader--done .preloader__logo,
    .preloader--done .preloader__text {
      display: none;
      color: #ff5705 !important;
      font-size: 15px;
    }

    .preloader--done .preloader__text--fail {
      display: block;
    }

    [ng\:cloak],
    [ng-cloak],
    .ng-cloak {
      display: none !important;
    }
  </style>

  <div class="preloader">
    <div class="preloader__enter">
      <div class="preloader__bounce">
        <div class="preloader__logo"></div>
      </div>
    </div>
    <div class="preloader__text">Loading dashboards</div>
    <div class="preloader__text preloader__text--fail">
      <p>
      <strong>If you're seeing this the Dashboards Server has encountered an error.</strong>
        <br />
        <br />
      </p>
      <p>
        Please attempt to restart the Dashboards Server on the Services page in the Admin Tool.
      </p>
    </div>
  </div>

  <grafana-app class="grafana-app" ng-cloak>
    <!--sidemenu class="sidemenu"></sidemenu-->
    <app-notifications-list class="page-alert-list"></app-notifications-list>


    <div class="main-view">
      <div class="scroll-canvas" page-scrollbar>
        <div ng-view></div>
      </div>
    </div>
  </grafana-app>

  <script>
    window.dashBootData = {
      user: [[.User]],
      settings: [[.Settings]],
      navTree: [[.NavTree]]

      var preloader = document.getElementsByClassName("preloader");
      if (preloader.length) {
        preloader[0].className = "preloader preloader--done";
      }
    };
  </script>
