<div class="navbar">
		<a class="navbar-page-btn" ng-if="ctrl.dashboard.meta.canSearch">
			<span ng-show="::ctrl.dashboard.meta.canSearch" ng-click="ctrl.showSearch()" bs-tooltip="ctrl.searchTitle" data-placement="bottom">
				<i class="fa fa-search"></i>
			</span>
			<span ng-click="ctrl.showSearch(ctrl.dashboard.meta.folderId)" data-placement="bottom" class="navbar-page-btn--title navbar-search-hint" ng-if="ctrl.dashboard.meta.isHome">
				Search Dashboards
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId > 0" bs-tooltip="ctrl.folderTitle" data-placement="bottom"
                class="navbar-page-btn--folder" ng-click="ctrl.showSearch(ctrl.dashboard.meta.folderId)">
				{{ctrl.dashboard.meta.folderTitle}}
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId === 0 && ctrl.dashboard.title.trim().length > 0"
                            bs-tooltip="ctrl.folderTitle" data-placement="bottom"
                                class="navbar-page-btn--folder" ng-click="ctrl.showSearch(0)">
				General
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId >= 0 && ctrl.dashboard.title.trim().length > 0" class="navbar-page-btn--sep">
				/
			</span>
			<span ng-click="ctrl.showSearch(ctrl.dashboard.meta.folderId)" bs-tooltip="ctrl.urlTitle.trim() || ctrl.dashboard.title.trim()" data-placement="bottom" class="navbar-page-btn--title">
				{{ctrl.urlTitle || ctrl.dashboard.title}}
			</span>
		</a>
		<div class="navbar-page-btn no-search" ng-if="!ctrl.dashboard.meta.canSearch">
			<span ng-show="::ctrl.dashboard.meta.canSearch" ng-click="ctrl.showSearch()" bs-tooltip="ctrl.searchTitle" data-placement="bottom">
				<i class="fa fa-search"></i>
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId > 0" class="navbar-page-btn--folder">
				{{ctrl.dashboard.meta.folderTitle}}
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId === 0 && ctrl.dashboard.title.trim().length > 0"
				class="navbar-page-btn--folder">
				General
			</span>
			<span ng-if="ctrl.dashboard.meta.folderId >= 0 && ctrl.dashboard.title.trim().length > 0" class="navbar-page-btn--sep">
				/
			</span>
			<span>
				{{ctrl.urlTitle || ctrl.dashboard.title}}
			</span>
		</div>
<div class="navbar-btn-panel">
	<div class="navbar-buttons navbar-buttons--playlist" ng-if="ctrl.playlistSrv.isPlaying">
		<a class="navbar-button navbar-button--tight" ng-click="ctrl.playlistSrv.prev()"><i class="fa fa-step-backward"></i></a>
		<a class="navbar-button navbar-button--tight" ng-click="ctrl.playlistSrv.stop()"><i class="fa fa-stop"></i></a>
		<a class="navbar-button navbar-button--tight" ng-click="ctrl.playlistSrv.next()"><i class="fa fa-step-forward"></i></a>
	</div>

	<div class="navbar-buttons navbar-buttons--actions">
      <a class="btn navbar-button navbar-button--add-dashboard" ng-show="::ctrl.dashboard.meta.canAddDashboard" bs-tooltip="'Add dashboard'" data-placement="bottom" href="dashboard/new">
         <i class="gicon gicon-dashboard-new"></i>
      </a>

      <a class="btn navbar-button navbar-button--add-folder" ng-show="::ctrl.dashboard.meta.canAddFolder" bs-tooltip="'Add folder'" data-placement="bottom" href="dashboards/folder/new">
         <i class="gicon gicon-folder-new"></i>
      </a>

      <a class="btn navbar-button navbar-button--import-dashboard" ng-show="::ctrl.dashboard.meta.canImportDashboard" bs-tooltip="'Import dashboard'" data-placement="bottom" href="dashboard/import">
         <i class="gicon gicon-dashboard-import"></i>
      </a>

      <a class="btn navbar-button navbar-button--import-dashboard" ng-show="::ctrl.dashboard.meta.canImportDashboard" bs-tooltip="'Import template'" data-placement="bottom" href="template/import">
         <i class="gicon gicon-import-template"></i>
      </a>

		<button class="btn navbar-button navbar-button--add-panel" ng-show="::ctrl.dashboard.meta.canSave" bs-tooltip="'Add panel'" data-placement="bottom" ng-click="ctrl.addPanel()">
			<i class="gicon gicon-add-panel"></i>
		</button>

		<button class="btn navbar-button navbar-button--star" ng-show="::ctrl.dashboard.meta.canStar" ng-click="ctrl.starDashboard()" bs-tooltip="'Mark as favorite'" data-placement="bottom">
			<i class="fa" ng-class="{'fa-star-o': !ctrl.dashboard.meta.isStarred, 'fa-star': ctrl.dashboard.meta.isStarred}"></i>
		</button>

    <button class="btn navbar-button navbar-button--share" ng-show="::ctrl.dashboard.meta.canShare" ng-click="ctrl.shareDashboard(0)" bs-tooltip="'Share dashboard'" data-placement="bottom">
			<i class="fa fa-share-square-o"></i>
		</button>

    <button class="btn navbar-button navbar-button--save" ng-show="ctrl.dashboard.meta.canSave" ng-click="ctrl.saveDashboard()" bs-tooltip="'Save dashboard <br> CTRL+S'" data-placement="bottom">
			<i class="fa fa-save"></i>
		</button>

		<a class="btn navbar-button navbar-button--snapshot-origin" ng-if="::ctrl.dashboard.snapshot.originalUrl" href="{{ctrl.sanitizeUrl(ctrl.dashboard.snapshot.originalUrl)}}" bs-tooltip="'Open original dashboard'" data-placement="bottom">
			<i class="fa fa-link"></i>
		</a>

		<button class="btn navbar-button navbar-button--settings" ng-click="ctrl.toggleSettings()" bs-tooltip="'Settings'" data-placement="bottom" ng-show="ctrl.dashboard.meta.showSettings">
			<i class="fa fa-cog"></i>
		</button>
	</div>

	<div class="navbar-buttons navbar-buttons--tv" ng-show="::ctrl.dashboard.meta.showViewMode">
    <button class="btn navbar-button navbar-button--tv" ng-click="ctrl.toggleViewMode()" bs-tooltip="'Cycle view mode'" data-placement="bottom">
      <i class="fa fa-desktop"></i>
    </button>
  </div>

	<gf-time-picker class="gf-timepicker-nav" dashboard="ctrl.dashboard" ng-if="!ctrl.dashboard.timepicker.hidden"></gf-time-picker>

	<div class="navbar-buttons navbar-buttons--close">
		<button class="btn navbar-button navbar-button--primary" ng-click="ctrl.close()" bs-tooltip="'Back to dashboard'" data-placement="bottom">
			<i class="fa fa-reply"></i>
		</button>
	</div>

</div>
</div>
<dashboard-search></dashboard-search>
