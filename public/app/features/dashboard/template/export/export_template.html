	<div>

			<button type="button" class="btn gf-form-btn width-10 btn-success" ng-click="ctrl.saveDashboardAsFile()">
				<i class="fa fa-save"></i> Save to file

			</button>
			<a class="btn btn-link" ng-click="ctrl.dismiss()">Cancel</a>
		</div>

	</div>
</div>
