<div ng-repeat="section in ctrl.results" class="search-section">
  <div class="search-section__header pointer" ng-hide="section.hideHeader" ng-class="{'selected': section.selected}" ng-click="ctrl.toggleFolderExpand(section)">
    <div ng-click="ctrl.toggleSelection(section, $event)">
      <gf-form-switch
         ng-show="ctrl.editable"
         ng-if="section.uid.indexOf('StatseekerDefault') !== 0"
         on-change="ctrl.selectionChanged($event)"
         checked="section.checked"
         switch-class="gf-form-switch--transparent gf-form-switch--search-result__section">
      </gf-form-switch>
    </div>
    <i class="search-section__header__icon" ng-class="section.icon"></i>
    <span class="search-section__header__text">{{::section.title}}</span>
    <a ng-show="section.url && section.uid.indexOf('StatseekerDefault') !== 0" href="{{section.url}}" class="search-section__header__link">
      <i class="fa fa-cog"></i>
    </a>
    <i class="fa fa-angle-down search-section__header__toggle" ng-show="section.expanded"></i>
    <i class="fa fa-angle-right search-section__header__toggle" ng-hide="section.expanded"></i>
  </div>

  <div class="search-section__header" ng-show="section.hideHeader"></div>

  <div ng-if="section.expanded">
   <a ng-repeat="item in section.items" class="search-item search-item--indent" ng-click="ctrl.hideMenu()"
   ng-class="{'selected': item.selected}" ng-href="{{::item.url}}" ng-if="!ctrl.isTemplate">
      <div ng-click="ctrl.toggleSelection(item, $event)">
        <gf-form-switch
           ng-show="ctrl.editable"
           ng-if="!section.url.includes('StatseekerDefault')"
           on-change="ctrl.selectionChanged()"
           checked="item.checked"
           switch-class="gf-form-switch--transparent gf-form-switch--search-result__item">
        </gf-form-switch>
      </div>
      <span class="search-item__icon">
        <i class="gicon mini gicon-dashboard-list"></i>
      </span>
      <span class="search-item__body">
        <div class="search-item__body-title">{{::item.title}}</div>
        <span class="search-item__body-folder-title">{{::item.folderTitle}}</span>
      </span>
      <span class="search-item__tags">
        <span ng-click="ctrl.selectTag(tag, $event)" ng-repeat="tag in item.tags" tag-color-from-name="tag" class="label label-tag">
          {{tag}}
        </span>
      </span>
    </a>
    <a ng-repeat="item in section.items" class="search-item search-item--indent" ng-click="ctrl.hideMenu()"
      ng-class="{'selected': item.selected}" ng-href="{{::item.url}}" ng-if="ctrl.isTemplate"
      >
      <div ng-click="ctrl.toggleSelection(item, $event)">
        <gf-form-switch
           ng-show="ctrl.editable"
           ng-if="!section.url.includes('StatseekerDefault')"
           on-change="ctrl.selectionChanged()"
           checked="item.checked"
           switch-class="gf-form-switch--transparent gf-form-switch--search-result__item">
        </gf-form-switch>
      </div>
      <span class="search-item__icon" ng-if="!ctrl.isTemplate">
        <i class="gicon mini gicon-dashboard-list"></i>
      </span>
      <span class="search-item__icon" ng-if="ctrl.isTemplate">
        <img ng-src="{{ctrl.getIcon(item)}}" height="24px" width="24px"/>
      </span>
      <span ng-click="ctrl.editSelection(item, $event)" class="search-item__properties">
        <div class="search-item__body-title">
         {{::item.title}}
         </div>
        <span title="{{item.folderTitle}}" class="search-item__body-folder-title">{{::item.folderTitle}}</span>
      </span>
      <span class="search-item__properties" ng-if="ctrl.isTemplate">
         <div class="template-label">
           Owner:
           <span class="template-value">{{::item.owner}}</span>
         </div>
      </span>
      <span ng-if="ctrl.isTemplate">
         <div class="template-label">
            Visibility:
            <span class="template-value">{{::item.access}}</span>
         </div>
      </span>
      <span class="search-item__tags">
        <span ng-click="ctrl.selectTag(tag, $event)" ng-repeat="tag in item.tags" tag-color-from-name="tag" class="label label-tag">
          {{tag}}
        </span>
      </span>
    </a>
  </div>
</div>
