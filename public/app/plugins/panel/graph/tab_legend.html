<div class="editor-row">
	<div class="section gf-form-group">
		<h5 class="section-heading">Options</h5>
		<gf-form-switch class="gf-form"
			label="Show" label-class="width-8"
			checked="ctrl.panel.legend.show" on-change="ctrl.refresh()">
		</gf-form-switch>
		<gf-form-switch class="gf-form"
			label="As Table" label-class="width-8"
			checked="ctrl.panel.legend.alignAsTable" on-change="ctrl.render()">
		</gf-form-switch>
		<gf-form-switch class="gf-form"
			label="To the right" label-class="width-8"
			checked="ctrl.panel.legend.rightSide" on-change="ctrl.render()">
		</gf-form-switch>
    <div ng-if="ctrl.panel.legend.rightSide && !ctrl.panel.legend.alignAsTable" class="gf-form">
      <label class="gf-form-label width-8">Width</label>
			<input type="number" class="gf-form-input max-width-5" placeholder="250" bs-tooltip="'Set a min-width for the legend side table/block'" data-placement="right" ng-model="ctrl.panel.legend.sideWidth" ng-change="ctrl.render()" ng-model-onblur>
		</div>
    <div ng-if="ctrl.panel.legend.rightSide && ctrl.panel.legend.alignAsTable" class="gf-form">
      <label class="gf-form-label width-8">Min.characters</label>
      <input type="number" class="gf-form-input max-width-5" placeholder="auto"
        bs-tooltip="'Set the minimum characters visible on the legend'" data-placement="right"
        ng-model="ctrl.panel.legend.minCharacters" ng-change="ctrl.render()" ng-model-onblur>
    </div>
	</div>

	<div class="section gf-form-group">
		<h5 class="section-heading">Values</h5>

      <div class="gf-form-inline">
			<gf-form-switch class="gf-form"
				label="Min" label-class="width-4"
				checked="ctrl.panel.legend.min" on-change="ctrl.legendValuesOptionChanged()">
			</gf-form-switch>

			<div class="gf-form">
				<input class="gf-form-input width-5" placeholder="header" bs-tooltip="'Add custom legend header'" data-placement="right" ng-model="ctrl.panel.legend.minHeader" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>

      <div class="gf-form-inline">
			<gf-form-switch class="gf-form"
				label="Max" label-class="width-4"
				checked="ctrl.panel.legend.max" on-change="ctrl.legendValuesOptionChanged()">
			</gf-form-switch>

			<div class="gf-form">
				<input class="gf-form-input width-5" placeholder="header" bs-tooltip="'Add custom legend header'" data-placement="right" ng-model="ctrl.panel.legend.maxHeader" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>

      <div class="gf-form-inline">
			<gf-form-switch class="gf-form"
				label="Avg" label-class="width-4"
				checked="ctrl.panel.legend.avg" on-change="ctrl.legendValuesOptionChanged()">
			</gf-form-switch>

			<div class="gf-form">
				<input class="gf-form-input width-5" placeholder="header" bs-tooltip="'Add custom legend header'" data-placement="right" ng-model="ctrl.panel.legend.avgHeader" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>

      <div class="gf-form-inline">
			<gf-form-switch class="gf-form"
				label="Current" label-class="width-4"
				checked="ctrl.panel.legend.current" on-change="ctrl.legendValuesOptionChanged()">
			</gf-form-switch>

			<div class="gf-form">
				<input class="gf-form-input width-5" placeholder="header" bs-tooltip="'Add custom legend header'" data-placement="right" ng-model="ctrl.panel.legend.currentHeader" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>

      <div class="gf-form-inline">
			<gf-form-switch class="gf-form"
				label="Total" label-class="width-4"
				checked="ctrl.panel.legend.total" on-change="ctrl.legendValuesOptionChanged()">
			</gf-form-switch>

			<div class="gf-form">
				<input class="gf-form-input width-5" placeholder="header" bs-tooltip="'Add custom legend header'" data-placement="right" ng-model="ctrl.panel.legend.totalHeader" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>

		<div class="gf-form-inline">
			<div class="gf-form">
				<label class="gf-form-label width-6">Decimals</label>
				<input type="number" class="gf-form-input width-5" placeholder="auto" bs-tooltip="'Override automatic decimal precision for legend and tooltips'" data-placement="right" ng-model="ctrl.panel.decimals" ng-change="ctrl.render()" ng-model-onblur>
			</div>
		</div>
	</div>

	<div class="section gf-form-group">
		<h5 class="section-heading">Hide series</h5>
		<gf-form-switch class="gf-form"
			label="With only nulls" label-class="width-10"
			checked="ctrl.panel.legend.hideEmpty" on-change="ctrl.render()">
		</gf-form-switch>
		<gf-form-switch class="gf-form"
			label="With only zeros" label-class="width-10"
			checked="ctrl.panel.legend.hideZero" on-change="ctrl.render()">
		</gf-form-switch>
	</div>
   <div class="section gf-form-group">
      <h5 class="section-heading">Drilldown/Link</h5>
      <div class="gf-form">
        <gf-dashboard-link dashboard="ctrl.panel.drilldown.dashboard"
              type="ctrl.panel.drilldown.type"
              link-name="ctrl.panel.drilldown.linkName"
              url="ctrl.panel.drilldown.url"
              keep-time="ctrl.panel.drilldown.keepTime"
              include-vars="ctrl.panel.drilldown.includeVars"
              target-blank="ctrl.panel.drilldown.targetBlank"
              report="ctrl.panel.drilldown.report"
              plugin="graph-chart"
              var-name="ctrl.panel.drilldown.varName"
              params="ctrl.panel.drilldown.params"
              on-dashboard-change="ctrl.panel.drilldown.params=''"
              show-legend="ctrl.panel.drilldown.showLegend" on-change="ctrl.refresh()">
        </gf-dashboard-link>
      </div>
   </div>
</div>
